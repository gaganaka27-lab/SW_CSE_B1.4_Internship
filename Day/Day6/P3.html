<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Overflow & wrapping</title>
    <style>
        p{
            white-space: nowrap;
        }
        .container {
            width: 80px;
            height: 20px;
            background-color: rgb(168, 36, 201);
        }

        .container-visible {
            overflow: visible;
        }

        .container-hidden {
            overflow: hidden;
        }

        .container-scroll {
            overflow: scroll;
        }

        .container-auto {
            overflow: auto;
        }
    </style>
</head>

<body>
    <p>Text Overflow & wrapping</p>
    <p class="container container-auto">I am Gagana K A</p>
    <p class="container container-hidden">I am Gagana K A</p>
    <p class="container container-scroll">I am Gagana K A</p>
    <p class="container container-visible">I am Gagana K A</p>
</body>

</html>
