<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image tags</title>
</head>
<body>
    <!-- src: source alt: alternative text | Self-closing tag -->
    <img src="i1.jpg" alt="could not find the image">
    <!-- Common attributes & variations -->
     <!--Width and Height-->
     <img src="i1.jpg" alt="could not find the image" width="500" height="500">
     <!-- Tooltip -->
     <img src="i1.jpg" alt="could not find the image" title="image of a flower">
     <img src="i1.jpg" alt="could not find the image" width="500" height="500" style="border-radius: 50%;border:5px solid #240202;">

     <!-- Image formats -->
      <!--1.Jpg 2.PNG 3.GIF 4.SVG 5.webp-->


    
</body>
</html>
